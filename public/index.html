<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Klinik Wyss</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="wrap">
        <p class="eyebrow">Willkommen</p>
        <h1>Klinik Wyss</h1>
        <p class="lede">
          Node.js-Anwendung mit Modul <strong>Digitale Behandlungsplanung</strong> (INES-Einbettung).
        </p>
      </div>
    </header>
    <main class="wrap">
      <section class="card">
        <h2>Behandlungsplanung testen</h2>
        <p>
          <a href="/plan?fallnr=DEMO&amp;user=demo.user">Öffnen: /plan?fallnr=DEMO&amp;user=demo.user</a>
        </p>
        <p class="lede" style="margin-top: 1rem">
          In INES wird die gleiche URL mit echter Fallnummer und Benutzer aufgerufen.
        </p>
      </section>
    </main>
    <footer class="site-footer">
      <div class="wrap">
        <small>&copy; <span id="y"></span> Klinik Wyss</small>
      </div>
    </footer>
    <script>
      document.getElementById("y").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
